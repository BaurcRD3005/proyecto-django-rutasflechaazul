{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zonas de Cobertura - Flecha Azul</title>
    <link rel="icon" type="image/x-icon" href="{% static 'images/logo.png' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Open+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/responsive.css' %}">

    <style>
        .zones-hero {
            padding: 8rem 0 3rem;
            background: linear-gradient(rgba(30, 64, 175, 0.9), rgba(30, 64, 175, 0.8));
            color: white;
        }

        .coverage-map {
            margin: 3rem 0;
            border-radius: var(--radio-borde);
            overflow: hidden;
            box-shadow: var(--sombra-fuerte);
            position: relative;
        }

        .search-zones {
            background: white;
            padding: 1.5rem;
            border-radius: var(--radio-borde);
            box-shadow: var(--sombra-suave);
            margin-bottom: 2rem;
        }

        .search-input-group {
            display: flex;
            gap: 1rem;
        }

        .search-input {
            flex: 1;
            padding: 1rem 1.5rem;
            border: 1px solid var(--azul-suave);
            border-radius: var(--radio-borde);
            font-size: 1rem;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--azul-secundario);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .no-results {
            text-align: center;
            padding: 3rem;
            color: var(--gris-medio);
            display: none;
        }

        .zones-hero h1,
        .zones-hero .hero-subtitle {
            color: white;
        }
    </style>
</head>

<body>
    <!-- HEADER -->
    <header class="header" id="header">
        <div class="container">
            <div class="header-content">
                <a href="{% url 'index' %}" class="logo">
                    <img src="{% static 'images/logo.png' %}" alt="Logo Flecha Azul" class="logo-img">
                    <span class="logo-text">Flecha Azul</span>
                </a>
                <nav class="nav">
                    <ul class="nav-links">
                        <li><a href="{% url 'index' %}" class="nav-link">Inicio</a></li>
                        <li><a href="{% url 'mapa' %}" class="nav-link">Mapa</a></li>
                        <li><a href="{% url 'horarios' %}" class="nav-link">Horarios</a></li>
                        <li><a href="{% url 'zonas' %}" class="nav-link active">Zonas</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <!-- HERO ZONAS -->
    <section class="zones-hero">
        <div class="container">
            <div class="hero-content">
                <h1>Zonas de Cobertura</h1>
                <p class="hero-subtitle">Encuentra la parada más cercana y calcula tu ruta al instante.</p>
            </div>
        </div>
    </section>

    <div class="container">
        <!-- BUSCADOR -->
        <div class="search-zones">
            <h3><i class="fas fa-search"></i> Busca tu zona</h3>
            <div class="search-input-group">
                <input type="text" class="search-input" id="origenInput" placeholder="Origen (tu ubicación o escribe)">
                <input type="text" class="search-input" id="destinoInput" placeholder="Destino">
                <button class="btn btn-primary" onclick="buscarRuta()"><i class="fas fa-search"></i> Buscar
                    ruta</button>
                <button class="btn btn-primary" onclick="obtenerUbicacion()"><i class="fas fa-location-arrow"></i> Usar
                    mi ubicación</button>
            </div>
        </div>

        <!-- MAPA -->
        <div class="coverage-map">
            <div id="map" style="width:100%; height:500px;"></div>
        </div>
    </div>

    {{ paradas_json|json_script:"paradas-data" }}

    <script>
        let mapaGlobal;
        let markersRuta = [];
        let rutaPolyline = null;
        let rutasMapa = [];
        let miUbicacion = null;

        function inicializarMapa() {
            const paradas = JSON.parse(document.getElementById('paradas-data').textContent);

            mapaGlobal = new google.maps.Map(document.getElementById('map'), {
                zoom: 12,
                center: { lat: 19.3182, lng: -98.2375 }
            });

            // Crear marcadores de todas las paradas
            paradas.forEach(p => {
                const marker = new google.maps.Marker({
                    position: { lat: Number(p.lat), lng: Number(p.lng) },
                    map: mapaGlobal,
                    title: p.nombre
                });

                const info = new google.maps.InfoWindow({
                    content: `<div style="padding:10px"><h4>${p.nombre}</h4></div>`
                });

                marker.addListener("click", () => {
                    info.open(mapaGlobal, marker);
                    // Al hacer click en parada, se dibuja la ruta hasta esa parada
                    if (miUbicacion) {
                        fetch(`/buscar_zona/?zona=${encodeURIComponent(p.nombre)}&lat=${miUbicacion.lat}&lng=${miUbicacion.lng}`)
                            .then(r => r.json())
                            .then(data => {
                                limpiarMapa();
                                const path = data.paradas.map(p => ({ lat: Number(p.lat), lng: Number(p.lng) }));
                                rutaPolyline = new google.maps.Polyline({
                                    path: path,
                                    geodesic: true,
                                    strokeColor: data.color || "#2563eb",
                                    strokeWeight: 5,
                                    map: mapaGlobal
                                });

                                data.paradas.forEach(par => {
                                    const m = new google.maps.Marker({
                                        position: { lat: Number(par.lat), lng: Number(par.lng) },
                                        map: mapaGlobal,
                                        title: par.nombre
                                    });
                                    markersRuta.push(m);
                                });

                                // Dibujar ruta desde ubicación del usuario a la parada clickeada
                                const directionsService = new google.maps.DirectionsService();
                                const directionsRenderer = new google.maps.DirectionsRenderer({ map: mapaGlobal });
                                directionsService.route({
                                    origin: miUbicacion,
                                    destination: path[path.length - 1],
                                    travelMode: google.maps.TravelMode.WALKING
                                }, (result, status) => {
                                    if (status === "OK") directionsRenderer.setDirections(result);
                                });
                            });
                    }
                });

                markersRuta.push(marker);
            });
        }

        function limpiarMapa() {
            markersRuta.forEach(m => m.setMap(null));
            markersRuta = [];
            if (rutaPolyline) rutaPolyline.setMap(null);
        }

        function obtenerUbicacion() {
            if (!navigator.geolocation) return;

            navigator.geolocation.getCurrentPosition(pos => {
                miUbicacion = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                document.getElementById('origenInput').value = miUbicacion.lat + ',' + miUbicacion.lng;

                new google.maps.Marker({
                    position: miUbicacion,
                    map: mapaGlobal,
                    title: "Tu ubicación",
                    icon: "http://maps.google.com/mapfiles/ms/icons/green-dot.png"
                });

                mapaGlobal.setCenter(miUbicacion);
            });
        }

        function distancia(lat1, lng1, lat2, lng2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) ** 2 +
                Math.cos(lat1 * Math.PI / 180) *
                Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLng / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function buscarRuta() {
            const destino = document.getElementById('destinoInput').value;
            if (!destino) return alert("Ingresa destino");

            const origenInput = document.getElementById('origenInput').value;
            const geocoder = new google.maps.Geocoder();

            const procesarUbicacion = (lat, lng) => {
                miUbicacion = { lat, lng };
                fetch(`/buscar_zona/?zona=${encodeURIComponent(destino)}&lat=${lat}&lng=${lng}`)
                    .then(r => r.json())
                    .then(data => {
                        limpiarMapa();
                        if (!data.paradas || data.paradas.length === 0) return alert("No hay ruta en esta zona");

                        const path = data.paradas.map(p => ({ lat: Number(p.lat), lng: Number(p.lng) }));
                        rutaPolyline = new google.maps.Polyline({
                            path: path,
                            geodesic: true,
                            strokeColor: data.color || "#2563eb",
                            strokeWeight: 5,
                            map: mapaGlobal
                        });

                        data.paradas.forEach(p => {
                            const marker = new google.maps.Marker({
                                position: { lat: Number(p.lat), lng: Number(p.lng) },
                                map: mapaGlobal,
                                title: p.nombre
                            });
                            const info = new google.maps.InfoWindow({
                                content: `<div style="padding:10px"><h4>${p.nombre}</h4></div>`
                            });
                            marker.addListener("click", () => info.open(mapaGlobal, marker));
                            markersRuta.push(marker);
                        });

                        // Si usuario está cerca de alguna parada
                        if (miUbicacion) {
                            let paradaCercana = null;
                            let distMin = Infinity;
                            data.paradas.forEach(p => {
                                const d = distancia(miUbicacion.lat, miUbicacion.lng, Number(p.lat), Number(p.lng));
                                if (d < distMin) {
                                    distMin = d;
                                    paradaCercana = p;
                                }
                            });
                            if (distMin <= 2) { // km
                                const directionsService = new google.maps.DirectionsService();
                                const directionsRenderer = new google.maps.DirectionsRenderer({ map: mapaGlobal });
                                directionsService.route({
                                    origin: miUbicacion,
                                    destination: { lat: Number(paradaCercana.lat), lng: Number(paradaCercana.lng) },
                                    travelMode: google.maps.TravelMode.WALKING
                                }, (result, status) => {
                                    if (status === "OK") directionsRenderer.setDirections(result);
                                });
                            }
                        }
                    });
            };

            if (origenInput) {
                geocoder.geocode({ address: origenInput }, (results, status) => {
                    if (status === "OK" && results[0]) {
                        const loc = results[0].geometry.location;
                        procesarUbicacion(loc.lat(), loc.lng());
                    } else {
                        alert("No se pudo localizar el origen escrito");
                    }
                });
            } else if (miUbicacion) {
                procesarUbicacion(miUbicacion.lat, miUbicacion.lng);
            } else {
                alert("Primero permite que se obtenga tu ubicación o escribe un origen");
            }
        }

        function mostrarTodasRutas() {
            const paradas = JSON.parse(document.getElementById('paradas-data').textContent);
            limpiarMapa();

            if (paradas.length > 0) {
                const path = paradas.map(p => ({ lat: Number(p.lat), lng: Number(p.lng) }));
                rutaPolyline = new google.maps.Polyline({
                    path: path,
                    geodesic: true,
                    strokeColor: "#2563eb",
                    strokeWeight: 5,
                    map: mapaGlobal
                });

                paradas.forEach(p => {
                    const marker = new google.maps.Marker({
                        position: { lat: Number(p.lat), lng: Number(p.lng) },
                        map: mapaGlobal,
                        title: p.nombre
                    });
                    const info = new google.maps.InfoWindow({
                        content: `<div style="padding:10px"><h4>${p.nombre}</h4></div>`
                    });
                    marker.addListener("click", () => info.open(mapaGlobal, marker));
                    markersRuta.push(marker);
                });

                const bounds = new google.maps.LatLngBounds();
                path.forEach(pt => bounds.extend(pt));
                mapaGlobal.fitBounds(bounds);
            }
        }
    </script>

    <script async defer
        src="https://maps.googleapis.com/maps/api/js?key={{ GOOGLE_MAPS_API_KEY }}&libraries=places&callback=inicializarMapa">
        </script>
</body>

</html>
